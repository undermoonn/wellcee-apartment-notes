<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellcee 房源侧边栏</title>
    <link rel="stylesheet" href="../popup/popup.css">
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body data-surface="sidepanel">
    <header class="header">
      <div>
        <span class="eyebrow">WELLCEE NOTES</span>
        <h1>我的房源</h1>
      </div>
      <p class="sidepanel-intro">收藏与私人笔记</p>
    </header>

    <nav class="view-tabs" role="tablist" aria-label="房源列表">
      <button
        id="favorite-tab"
        class="view-tab is-active"
        type="button"
        role="tab"
        aria-selected="true"
        aria-controls="favorite-panel"
      >
        收藏
        <span id="favorite-count" class="view-tab__count" aria-hidden="true">0</span>
      </button>
      <button
        id="note-tab"
        class="view-tab"
        type="button"
        role="tab"
        aria-selected="false"
        aria-controls="note-panel"
      >
        有笔记
        <span id="note-count" class="view-tab__count" aria-hidden="true">0</span>
      </button>
    </nav>

    <div class="sort-bar" aria-label="列表设置">
      <div class="open-mode" aria-label="房源打开方式">
        <span id="open-current-label" class="open-mode__choice">当前页面</span>
        <label class="open-mode__switch">
          <input
            id="open-in-new-tab"
            class="open-mode__input"
            type="checkbox"
            role="switch"
            aria-label="使用新标签页打开房源"
            checked
          >
          <span class="open-mode__track" aria-hidden="true"></span>
        </label>
        <span id="open-new-tab-label" class="open-mode__choice is-active">新标签页</span>
      </div>
      <div class="sort-bar__group">
        <span class="sort-bar__label">排序</span>
        <div class="sort-toggle" role="group" aria-label="选择排序方式">
          <button
            id="sort-default"
            class="sort-toggle__button is-active"
            type="button"
            aria-pressed="true"
          >默认</button>
          <button
            id="sort-rating"
            class="sort-toggle__button"
            type="button"
            aria-pressed="false"
          >评分</button>
        </div>
      </div>
    </div>

    <main>
      <div id="view-track" class="view-track" data-view="favorites">
        <section
          id="favorite-panel"
          class="view-panel"
          role="tabpanel"
          aria-labelledby="favorite-tab"
          aria-hidden="false"
        >
          <div id="favorite-empty-state" class="empty-state" hidden>
            <span class="empty-state__icon empty-state__icon--favorite" aria-hidden="true"></span>
            <strong>还没有收藏房源</strong>
            <p>在 Wellcee 列表或详情页点击收藏按钮，房源链接就会出现在这里。</p>
          </div>
          <div id="favorite-list" class="listing-list" aria-live="polite"></div>
        </section>

        <section
          id="note-panel"
          class="view-panel"
          role="tabpanel"
          aria-labelledby="note-tab"
          aria-hidden="true"
          inert
        >
          <div id="note-empty-state" class="empty-state" hidden>
            <span class="empty-state__icon empty-state__icon--note" aria-hidden="true"></span>
            <strong>还没有房源笔记</strong>
            <p>在 Wellcee 房源详情页输入笔记后，对应房源会出现在这里。</p>
          </div>
          <div id="note-list" class="listing-list" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <footer class="data-footer">
      <div class="data-actions">
        <button id="export-data" class="data-action" type="button">导出数据</button>
        <button id="import-data" class="data-action" type="button">导入数据</button>
        <input
          id="import-file"
          type="file"
          accept=".json,application/json"
          hidden
        >
      </div>
      <span id="data-status" class="data-status" role="status" aria-live="polite">
        收藏和笔记仅保存在当前 Chrome
      </span>
    </footer>

    <script src="../popup/popup.js"></script>
  </body>
</html>
