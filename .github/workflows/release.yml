name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag belongs to main
        shell: bash
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          release_commit="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "${release_commit}" origin/main; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main." >&2
            exit 1
          fi

      - name: Build and test extension
        run: pnpm test

      - name: Verify release version
        run: node scripts/verify-release-version.mjs "${GITHUB_REF_NAME}"

      - name: Package extension
        id: package
        shell: bash
        run: |
          archive="wellcee-apartment-notes-${GITHUB_REF_NAME}.zip"
          package_root="release/wellcee-apartment-notes"
          mkdir -p "${package_root}"
          cp -R dist/. "${package_root}/"
          cd release
          zip -q -r "../${archive}" wellcee-apartment-notes
          cd ..
          sha256sum "${archive}" > "${archive}.sha256"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ARCHIVE: ${{ steps.package.outputs.archive }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${RELEASE_ARCHIVE}#Wellcee 房源笔记 Chrome 扩展安装包" \
            "${RELEASE_ARCHIVE}.sha256#SHA-256 checksum" \
            --verify-tag \
            --generate-notes \
            --title "Wellcee 房源笔记 ${GITHUB_REF_NAME}"
